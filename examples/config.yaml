# yaml-language-server: $schema=https://raw.githubusercontent.com/chfuchte/aula-assistant/refs/heads/master/etc/config.schema.json

defaults:
    tablet_mode: false

security:
    advanced_pin: "0000"

lighting:
    artnet:
        bind: 0.0.0.0:6454 # bind address for socket
        broadcast: true # broadcast udp
        target: 255.255.255.255:6454 # target address for socket
        universe: 0 # just one universe for now
    patch:
        types:
            - name: spot # fixture type name
              channels: # order matters
                  - red
                  - green
                  - blue
        patched:
            - name: spot1 # label
              type: spot # fixture type name
              channel: 1 # starting dmx channel
    scenes:
        Power On:
            sets:
                - fixture: spot1
                  channel: red
                  value: 255
                - fixture: spot1
                  channel: green
                  value: 255
                - fixture: spot1
                  channel: blue
                  value: 255
        Power Off:
            sets:
                - fixture: spot1
                  channel: red
                  value: 0
                - fixture: spot1
                  channel: green
                  value: 0
                - fixture: spot1
                  channel: blue
                  value: 0

hdmimatrix:
    host: 127.0.0.1
    port: 80

x32:
    bind: 0.0.0.0:10024
    target: 192.168.178.120:10023
