version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "quarterly"
      labels:
          - "dependencies"
      open-pull-requests-limit: 5

    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: "weekly"
      labels:
          - "dependencies"
      open-pull-requests-limit: 5

    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
      labels:
          - "dependencies"
      open-pull-requests-limit: 5
      groups:
          npm-dependencies:
              patterns:
                  - "*"
